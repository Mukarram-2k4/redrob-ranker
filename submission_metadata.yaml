   "Claude" #Used for architecture discussion, code review, pair programming
   "Gemini" #Used via Antigravity coding assistant"

ai_usage_summary: |
  Used Claude (via Antigravity) as a pair-programming assistant for architecture
  design, code review, and debugging. No candidate profile data was fed to any
  LLM. The scoring logic, skill taxonomy, NLP phrase lists, honeypot rules, and
  all algorithmic design decisions were engineered by the team. AI tools were
  used as a productivity multiplier, not as the ranking system itself.

# ============================================================================
# Approach summary (≤200 words)
# ============================================================================
methodology_summary: |
  Hybrid semantic retrieval and Reciprocal Rank Fusion (RRF) candidate ranker.

  Five-dimension RRF pipeline: fuses independent ranks across: (1) Technical
  score (Aho-Corasick NLP scanning + experience + domain alignment), (2) Career
  Trajectory (title relevance + pedigree + location + education), (3) Behavioral
  score (engagement + credibility), (4) Trust score (inverse honeypot rules),
  and (5) Semantic similarity (local TF-IDF vector space model with cosine
  similarity on JD vs candidates).

  Honeypot-aware ranking: checks 14 honeypot indicators (salary inversion, Young
  Career High YOE, overlapping/impossible tenures, inactive profiles, fixture
  names, tech time-travel, empty expertise). Key insight: the JD explicitly warns
  against ranking by AI keyword count. Our title_relevance multiplier and temporal
  decay on career NLP directly address this. Offline execution: ~58s runtime on CPU,
  no network/API calls, no GPU required. Passed 115 E2E tests.

