ai_tools_used:
  - "Claude"    # Used for architecture discussion, code review, pair programming
  - "Gemini"    # Used via Antigravity coding assistant

ai_usage_summary: |
  Used Claude (via Antigravity) as a pair-programming assistant for architecture
  design, code review, and debugging. No candidate profile data was fed to any
  LLM. The scoring logic, skill taxonomy, NLP phrase lists, honeypot rules, and
  all algorithmic design decisions were engineered by the team. AI tools were
  used as a productivity multiplier, not as the ranking system itself.

# ============================================================================
# Approach summary (≤200 words)
# ============================================================================
methodology_summary: |
  Rule-based + feature-weighted ranking engine. No LLMs, no GPU, no embeddings.

  Eight-stage pipeline: (1) Aho-Corasick automaton compiled from 80+ production
  NLP phrases, (2) stream-parse 100K JSONL candidates, (3) early eliminate ~69K
  low-quality/honeypot candidates, (4) compute 12 features across three groups:
  behavioral (availability, engagement, credibility), tabular (experience fit,
  company type, location, title relevance), and semantic (career NLP with
  temporal decay, skill depth with tier weights, domain classification),
  (5) honeypot full-pass on survivors, (6) composite scoring with title-relevance
  multiplier to penalize keyword-stuffers, (7) select top 100 with guardrails,
  (8) generate per-candidate reasoning from actual profile data.

  Key insight: the JD explicitly warns against ranking by AI keyword count.
  Our title_relevance multiplier (0.25× for non-ML titles) and temporal decay
  on career NLP directly address this. Runtime: ~41s for 100K candidates on CPU.

